<!DOCTYPE html>

<html>

<head>
	<link rel="stylesheet" href="styles.css">
</head>

<body>
	<!-- the entire body must be written by student -->
	<form method="post">
		<label for="name">Name:</label>
	<input type="text" id="name" required/>
	<br/>
	<label for="email">Email:</label>
	<input type="email" id="email" required/>
	<br/>
	<label>Select Gender :</label>
	<input type="radio" required name="gender"/>Male

	<input type="radio" required name="gender"/>Female
	<br/>

	<select required id="cars">
		<option>BMW</option>
		<option>Audi</option>
		<option>Mercedez</option>
	</select>
	<br/>

	<label for="carage">Car age:</label>
	<input type="number" id="carage" required/>

	<br/>

	<label for="dop">Date of purchase(dop):</label>
	<input type="date" id="dop" required/>

	
	<label for="password">Password</label>
	<input type="password" id="password" required/>

	<button type="submit">Submit</button>
	</form>
	
    <script type="text/javascript" src="./script.js">
</script>

</body>

</html>
